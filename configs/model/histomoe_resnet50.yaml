# HistoMoE ResNet-50 Model Configuration

model:
  backbone: resnet50
  n_genes: 250
  n_experts: 5
  embed_dim: 512
  meta_dim: 256
  metadata_mode: lookup
  gating_mode: soft
  top_k: 2
  dropout: 0.1
  lr: 1.0e-4
  weight_decay: 1.0e-4
  lr_scheduler: cosine
  freeze_backbone: false
  load_balance_weight: 0.01
  pretrained_backbone: true
